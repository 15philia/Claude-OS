<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #a78bfa;
    }

    #status {
      font-size: 1.1rem;
      color: #c4b5fd;
      height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #1e1e30;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #2a2a42;
      transform: scale(1.04);
    }

    .cell.x { color: #f472b6; }
    .cell.o { color: #34d399; }

    .cell.win {
      background: #2e1f4a;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.06); }
    }

    #scores {
      display: flex;
      gap: 32px;
    }

    .score-box {
      text-align: center;
      background: #1e1e30;
      border-radius: 12px;
      padding: 12px 24px;
    }

    .score-label { font-size: 0.75rem; letter-spacing: 0.1em; color: #a78bfa; text-transform: uppercase; }
    .score-value { font-size: 2rem; font-weight: bold; }
    .score-box.x .score-value { color: #f472b6; }
    .score-box.o .score-value { color: #34d399; }
    .score-box.tie .score-value { color: #facc15; }

    #reset {
      padding: 10px 32px;
      border: none;
      border-radius: 8px;
      background: #7c3aed;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    #reset:hover { background: #6d28d9; }

    #mode-toggle {
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      padding: 6px 18px;
      border: 2px solid #7c3aed;
      border-radius: 6px;
      background: transparent;
      color: #a78bfa;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: #7c3aed;
      color: #fff;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="mode-toggle">
    <button class="mode-btn active" id="btn-2p">2 Players</button>
    <button class="mode-btn" id="btn-ai">vs CPU</button>
  </div>

  <div id="scores">
    <div class="score-box x"><div class="score-label">X</div><div class="score-value" id="score-x">0</div></div>
    <div class="score-box tie"><div class="score-label">Tie</div><div class="score-value" id="score-tie">0</div></div>
    <div class="score-box o"><div class="score-label">O</div><div class="score-value" id="score-o">0</div></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, scores, vsAI;

  scores = { X: 0, O: 0, tie: 0 };
  vsAI = false;

  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const scoreX = document.getElementById('score-x');
  const scoreO = document.getElementById('score-o');
  const scoreTie = document.getElementById('score-tie');

  document.getElementById('btn-2p').addEventListener('click', () => setMode(false));
  document.getElementById('btn-ai').addEventListener('click', () => setMode(true));
  document.getElementById('reset').addEventListener('click', resetGame);
  cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));

  function setMode(ai) {
    vsAI = ai;
    document.getElementById('btn-2p').classList.toggle('active', !ai);
    document.getElementById('btn-ai').classList.toggle('active', ai);
    scores = { X: 0, O: 0, tie: 0 };
    updateScores();
    resetGame();
  }

  function resetGame() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "X's turn";
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    place(i, current);
    const win = checkWin();
    if (!win && !board.every(Boolean)) {
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
      if (vsAI && current === 'O') setTimeout(aiMove, 300);
    }
  }

  function place(i, player) {
    board[i] = player;
    cells[i].textContent = player;
    cells[i].classList.add(player.toLowerCase(), 'taken');
  }

  function checkWin() {
    for (const [a,b,c] of WINS) {
      if (board[a] && board[a] === board[b] && board[b] === board[c]) {
        [a,b,c].forEach(i => cells[i].classList.add('win'));
        status.textContent = `${board[a]} wins!`;
        scores[board[a]]++;
        updateScores();
        gameOver = true;
        return true;
      }
    }
    if (board.every(Boolean)) {
      status.textContent = "It's a tie!";
      scores.tie++;
      updateScores();
      gameOver = true;
      return true;
    }
    return false;
  }

  function updateScores() {
    scoreX.textContent = scores.X;
    scoreO.textContent = scores.O;
    scoreTie.textContent = scores.tie;
  }

  function aiMove() {
    const move = bestMove();
    place(move, 'O');
    const win = checkWin();
    if (!win) {
      current = 'X';
      status.textContent = "X's turn";
    }
  }

  function bestMove() {
    let best = -Infinity, idx = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, 0, false);
        board[i] = null;
        if (score > best) { best = score; idx = i; }
      }
    }
    return idx;
  }

  function minimax(b, depth, isMax) {
    for (const [a,bv,c] of WINS) {
      if (b[a] && b[a] === b[bv] && b[bv] === b[c])
        return b[a] === 'O' ? 10 - depth : depth - 10;
    }
    if (b.every(Boolean)) return 0;
    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) if (!b[i]) { b[i]='O'; best=Math.max(best,minimax(b,depth+1,false)); b[i]=null; }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) if (!b[i]) { b[i]='X'; best=Math.min(best,minimax(b,depth+1,true)); b[i]=null; }
      return best;
    }
  }

  resetGame();
</script>
</body>
</html>
